workflows:
  skyvpn-android-build:
    name: SkyVPN Android Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm install
          npx expo install --fix
      - name: Expo Prebuild
        script: |
          rm -rf android
          npx expo prebuild --platform android --no-install --non-interactive
      - name: Disable PNG Crunching (AAPT Fix)
        script: |
          # This magic line prevents the "AAPT: error: file failed to compile" by disabling PNG optimization
          sed -i '' 's/android {/android { aaptOptions { cruncherEnabled = false } /' android/app/build.gradle
      - name: Build Android Release APK
        script: |
          export NODE_OPTIONS="--max-old-space-size=8192"
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - dineshwebdev2003@gmail.com
        notify:
          success: true
          failure: true
