workflows:
  android-native-build:
    name: SkyVPN Native APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 18 # Switched to 18 for better Expo compatibility
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Cleanup previous builds
        script: |
          rm -rf android
          npm cache clean --force
      - name: Expo Prebuild
        script: |
          npx expo install --check
          npx expo prebuild --platform android --no-install
      - name: Build Android APK
        script: |
          export NODE_OPTIONS="--max-old-space-size=8192"
          # Forcing Kotlin version and memory limits
          export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx4096m -Dkotlin.version=1.9.24"
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon --stacktrace
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - dineshwebdev2003@gmail.com
