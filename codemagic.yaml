workflows:
  skyvpn-android-build:
    name: SkyVPN Android Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm install
          npx expo install --fix
      - name: Expo Prebuild
        script: |
          rm -rf android
          npx expo prebuild --platform android --no-install --non-interactive
      - name: Force Stable Build Config
        script: |
          # 1. Disable PNG optimization (AAPT Fix)
          sed -i '' 's/android {/android { aaptOptions { cruncherEnabled = false } /' android/app/build.gradle
          
          # 2. Force Legacy Resource System and Stable SDKs
          echo "android.resource.compilation.enabled=false" >> android/gradle.properties
          echo "android.nonTransitiveRClass=false" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx6144m" >> android/gradle.properties
      - name: Build Android Release APK
        script: |
          export NODE_OPTIONS="--max-old-space-size=8192"
          cd android
          chmod +x gradlew
          # Pass SDK versions directly to Gradle to override the prebuild defaults
          ./gradlew clean assembleRelease \
            -PcompileSdkVersion=34 \
            -PtargetSdkVersion=34 \
            -PbuildToolsVersion=34.0.0 \
            --no-daemon
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - dineshwebdev2003@gmail.com
        notify:
          success: true
          failure: true
