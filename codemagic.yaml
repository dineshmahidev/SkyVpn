workflows:
  android-native-build:
    name: SkyVPN Native APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 20
      java: 17
    # working_directory: . # Project is in root
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Cleanup previous builds
        script: rm -rf android
      # - name: Create google-services.json (Add this back if you use Firebase)
      #   script: |
      #     echo $GOOGLE_SERVICES_JSON | base64 --decode > google-services.json
      - name: Expo Prebuild
        script: npx expo prebuild --platform android --no-install
      - name: Build Android APK
        script: |
          export NODE_OPTIONS="--max-old-space-size=8192"
          cd android
          chmod +x gradlew
          ./gradlew clean assembleRelease --no-daemon --stacktrace
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - dineshwebdev2003@gmail.com
