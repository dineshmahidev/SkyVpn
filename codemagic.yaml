workflows:
  android-debug:
    name: SkyVPN Debug Build
    max_build_duration: 60
    instance_type: linux
    environment:
      node: 18.20.4
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
        - pattern: 'main'
          include: false
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Debug APK
        script: npx eas-cli build --platform android --profile development --non-interactive
    artifacts:
      - build/*.apk

  android-release:
    name: SkyVPN Release APK
    max_build_duration: 60
    instance_type: linux
    environment:
      node: 18.20.4
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Release APK
        script: npx eas-cli build --platform android --profile preview --non-interactive
    artifacts:
      - build/*.apk
