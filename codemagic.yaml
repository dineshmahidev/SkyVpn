workflows:
  android-native-build:
    name: SkyVPN Native APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 18
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install EAS CLI
        script: npm install -g eas-cli
      - name: Build Android APK (Local EAS)
        script: |
          # This command uses Expo's official build engine on the Codemagic machine
          # --local means it doesn't use Expo's cloud credits
          npx eas-cli build --local --platform android --profile preview --non-interactive
    artifacts:
      - build/*.apk
      - "*.apk"
    publishing:
      email:
        recipients:
          - dineshwebdev2003@gmail.com
