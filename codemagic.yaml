workflows:
  skyvpn-android-build:
    name: SkyVPN Android Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm install
          npx expo install --fix
      - name: Expo Prebuild
        script: |
          rm -rf android
          npx expo prebuild --platform android --no-install --non-interactive
      - name: Fix Android Resource Compilation
        script: |
          # 1. Disable PNG optimization (AAPT Fix)
          sed -i '' 's/android {/android { aaptOptions { cruncherEnabled = false } /' android/app/build.gradle
          
          # 2. Tell Gradle to ignore individual resource failures and keep building
          echo "android.resource.compilation.enabled=false" >> android/gradle.properties
          
          # 3. Increase Gradle's memory to handle the complex asset bundles
          echo "org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=1024m" >> android/gradle.properties
      - name: Build Android Release APK
        script: |
          export NODE_OPTIONS="--max-old-space-size=8192"
          cd android
          chmod +x gradlew
          # Perform a hard clean before building
          ./gradlew clean
          ./gradlew assembleRelease --no-daemon --stacktrace
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - dineshwebdev2003@gmail.com
        notify:
          success: true
          failure: true
