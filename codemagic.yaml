workflows:
  skyvpn-android-build:
    name: SkyVPN Android Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm install
          npx expo install --fix
      - name: Expo Prebuild
        script: |
          rm -rf android
          npx expo prebuild --platform android --no-install --non-interactive
      - name: Force SDK 35 and Disable Crunching
        script: |
          # Force SDK 35 to avoid SDK 36 bugs
          sed -i '' 's/compileSdkVersion = .*/compileSdkVersion = 35/' android/build.gradle
          sed -i '' 's/targetSdkVersion = .*/targetSdkVersion = 35/' android/build.gradle
          
          # Disable PNG optimization (AAPT Fix)
          sed -i '' 's/android {/android { aaptOptions { cruncherEnabled = false } /' android/app/build.gradle
          
          # Force legacy resource system
          echo "android.resource.compilation.enabled=false" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx6144m" >> android/gradle.properties
      - name: Build Android Release APK
        script: |
          export NODE_OPTIONS="--max-old-space-size=8192"
          cd android
          chmod +x gradlew
          ./gradlew clean assembleRelease --no-daemon
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - dineshwebdev2003@gmail.com
        notify:
          success: true
          failure: true
