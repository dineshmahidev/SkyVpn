workflows:
  android-native-build:
    name: SkyVPN Native APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Cleanup previous builds
        script: |
          rm -rf android
          # rm -rf node_modules # Optional: Uncomment if dependencies acting strange
      - name: Expo Prebuild
        script: npx expo prebuild --platform android --no-install
      - name: Build Android APK
        script: |
          export NODE_OPTIONS="--max-old-space-size=8192"
          export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m"
          cd android
          chmod +x gradlew
          ./gradlew clean assembleRelease --no-daemon --info --stacktrace
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - dineshwebdev2003@gmail.com
